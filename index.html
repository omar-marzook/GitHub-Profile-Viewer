<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Profile Viewer</title>
    <link rel="stylesheet" href="./src/style.css">
</head>

<body>

    <section class="container">
        <h1>GitHub Profile Viewer</h1>
        <section class="input-wrapper">
            <input class="username-input" type="text" id="username" placeholder="Enter GitHub username">
            <button class="input-btn" id="getRepos">View Repositories</button>
        </section>
        <h2 class="profile-name" id="profile"></h2>
    </section>

    <div class="container">
        <section class="repo-list">
            <article class="repo-card">
                <h3 class="repo-card__name"></h3>
                <a class="repo-card__btn" href="" target="_blank" rel="noopener noreferrer">View Repository</a>
            </article>
            <article class="repo-card">
                <h3 class="repo-card__name"></h3>
                <a class="repo-card__btn" href="" target="_blank" rel="noopener noreferrer">View Repository</a>
            </article>
            <article class="repo-card">
                <h3 class="repo-card__name"></h3>
                <a class="repo-card__btn" href="" target="_blank" rel="noopener noreferrer">View Repository</a>
            </article>
            <article class="repo-card">
                <h3 class="repo-card__name"></h3>
                <a class="repo-card__btn" href="" target="_blank" rel="noopener noreferrer">View Repository</a>
            </article>
        </section>
    </div>
    <script src="./src/main.js"></script>
</body>

</html>
